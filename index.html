<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>粗利ランキング - IF部門</title>
<link rel="apple-touch-icon" href="data:,">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root{--p:#6C5CE7;--pl:#a29bfe;--bg:#f5f6fa;--c:#fff;--t:#2d3436;--tl:#636e72;--b:#e0e0e0}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:var(--bg);color:var(--t);line-height:1.6;-webkit-text-size-adjust:100%;padding-bottom:env(safe-area-inset-bottom)}

.nav{position:sticky;top:0;z-index:100;background:var(--p);padding:8px 8px;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nb{display:inline-block;padding:10px 18px;border-radius:24px;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:14px;cursor:pointer;margin:2px 3px;transition:all .2s;-webkit-appearance:none}
.nb.on{background:#fff;color:var(--p);font-weight:700}

.vw{display:none;padding:12px;max-width:800px;margin:0 auto}
.vw.on{display:block}

/* Stats cards - 2 cols on mobile */
.sts{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.st{background:var(--c);border-radius:12px;padding:14px 10px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.st .v{font-size:20px;font-weight:700;color:var(--p);word-break:break-all}
.st .l{font-size:11px;color:var(--tl);margin-top:2px}
@media(min-width:600px){.sts{grid-template-columns:repeat(3,1fr)}}

/* Month bar chart */
.mc{display:flex;gap:3px;align-items:flex-end;height:90px;margin-bottom:12px;background:var(--c);border-radius:12px;padding:12px 8px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.mbw{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end}
.mb{width:100%;background:var(--pl);border-radius:4px 4px 0 0;min-height:2px;transition:height .3s}
.mbv{font-size:8px;color:var(--tl);margin-bottom:2px;writing-mode:vertical-rl;text-orientation:mixed;max-height:30px;overflow:hidden}
.mbl{font-size:10px;color:var(--tl);margin-top:3px;font-weight:600}

/* Agent overview cards */
.acs{display:grid;gap:10px}
.ac{background:var(--c);border-radius:14px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;transition:transform .15s;display:flex;align-items:center;gap:12px;-webkit-user-select:none}
.ac:active{transform:scale(.97)}
.ark{font-size:22px;font-weight:700;min-width:36px;text-align:center}
.ain{flex:1;min-width:0}
.anm{font-weight:700;font-size:17px}
.atm{font-size:12px;color:var(--tl)}
.amr{text-align:right;flex-shrink:0}
.amr .bg{font-size:17px;font-weight:700;color:var(--p)}
.amr .sb{font-size:10px;color:var(--tl)}

/* Priority cards */
.pr{background:var(--c);border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:12px;overflow:hidden}
.prt{background:#FFF3E0;padding:14px 16px;font-weight:700;color:#E65100;font-size:15px}
.pri{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--b)}
.pri:nth-child(-n+4){background:#E8F5E9}
.prr{font-weight:700;font-size:18px;color:var(--p);min-width:28px;text-align:center}
.pin{flex:1;min-width:0}
.pnm{font-weight:600;font-size:15px}
.pdt{font-size:12px;color:var(--tl)}
.pts{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.ptg{font-size:10px;padding:3px 10px;border-radius:12px;background:#F0EDFF;color:var(--p);font-weight:500}
.prm{text-align:right;font-weight:700;font-size:15px;color:var(--p);white-space:nowrap;flex-shrink:0}

/* Master list - card based for mobile */
.stl{font-size:15px;font-weight:700;color:var(--tl);margin:16px 0 8px;padding-left:4px}
.ml{display:grid;gap:8px;margin-bottom:16px}
.mi{background:var(--c);border-radius:12px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer}
.mi-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.mi-rk{font-weight:700;font-size:16px;min-width:28px;text-align:center;height:28px;line-height:28px;border-radius:50%}
.mi-r1{background:#FFD700}.mi-r2{background:#C0C0C0}.mi-r3{background:#CD7F32;color:#fff}
.mi-nm{font-weight:700;font-size:15px;flex:1}
.mi-mg{font-weight:700;font-size:16px;color:var(--p)}
.mi-row{display:flex;justify-content:space-between;font-size:12px;color:var(--tl);padding:2px 0}
.mi-row span:last-child{font-weight:600;color:var(--t)}
.mi-months{display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--b)}
.mi-months.open{display:block}
.mi-bar{display:flex;gap:2px;align-items:flex-end;height:40px;margin-top:4px}
.mi-b{flex:1;background:var(--pl);border-radius:2px 2px 0 0;min-height:1px}
.mi-bl{display:flex;justify-content:space-between;font-size:9px;color:var(--tl);margin-top:2px}

.xb{display:block;width:100%;padding:14px;text-align:center;background:#F0EDFF;color:var(--p);border:none;border-radius:12px;cursor:pointer;font-size:14px;font-weight:600;margin-bottom:16px}
</style>
</head>
