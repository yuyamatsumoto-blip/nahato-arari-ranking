<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>粗利ランキング</title>
<style>
:root {
  --primary: #6C5CE7; --primary-light: #a29bfe; --bg: #f5f6fa;
  --card: #fff; --text: #2d3436; --text-light: #636e72; --border: #e0e0e0;
  --gold: #FFD700; --silver: #C0C0C0; --bronze: #CD7F32;
  --green: #E8F5E9; --orange-bg: #FFF3E0; --purple-bg: #F0EDFF;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }

/* Nav tabs */
.nav { position:sticky; top:0; z-index:100; background:var(--primary); padding:8px; overflow-x:auto; white-space:nowrap; -webkit-overflow-scrolling:touch; }
.nav-btn { display:inline-block; padding:8px 16px; border-radius:20px; border:none; background:rgba(255,255,255,0.15); color:#fff; font-size:13px; cursor:pointer; margin:2px 3px; transition:all .2s; }
.nav-btn.active { background:#fff; color:var(--primary); font-weight:700; }

/* Views */
.view { display:none; padding:16px; max-width:1200px; margin:0 auto; }
.view.active { display:block; }

/* Stats grid */
.stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
.stat { background:var(--card); border-radius:12px; padding:12px; text-align:center; box-shadow:0 1px 4px rgba(0,0,0,.06); }
.stat .val { font-size:18px; font-weight:700; color:var(--primary); }
.stat .lbl { font-size:10px; color:var(--text-light); margin-top:2px; }
@media(min-width:600px) { .stats { grid-template-columns:repeat(6,1fr); } .stat .val { font-size:22px; } }

/* Monthly chart bar */
.month-chart { display:flex; gap:4px; align-items:flex-end; height:80px; margin-bottom:16px; background:var(--card); border-radius:12px; padding:12px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
.month-bar-wrap { flex:1; display:flex; flex-direction:column; align-items:center; height:100%; justify-content:flex-end; }
.month-bar { width:100%; background:var(--primary-light); border-radius:4px 4px 0 0; min-height:2px; transition:height .3s; }
.month-bar-lbl { font-size:9px; color:var(--text-light); margin-top:2px; }

/* Table */
.table-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; background:var(--card); border-radius:12px; box-shadow:0 1px 4px rgba(0,0,0,.06); margin-bottom:16px; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { background:var(--primary); color:#fff; padding:10px 8px; text-align:center; position:sticky; top:0; white-space:nowrap; font-size:11px; }
td { padding:8px; border-bottom:1px solid var(--border); white-space:nowrap; }
td.name { font-weight:600; position:sticky; left:0; background:var(--card); z-index:1; min-width:100px; }
th.sticky { position:sticky; left:0; z-index:2; }
td.num { text-align:right; font-variant-numeric:tabular-nums; }
td.center { text-align:center; }
tr:hover { background:#f8f7ff; }
tr:hover td.name { background:#f8f7ff; }
.rank { display:inline-block; width:24px; height:24px; border-radius:50%; text-align:center; line-height:24px; font-size:11px; font-weight:700; }
.rank-1 { background:var(--gold); } .rank-2 { background:var(--silver); } .rank-3 { background:var(--bronze); color:#fff; }

/* Priority */
.priority { background:var(--card); border-radius:12px; box-shadow:0 1px 4px rgba(0,0,0,.06); margin-bottom:16px; overflow:hidden; }
.priority-title { background:var(--orange-bg); padding:12px 16px; font-weight:700; color:#E65100; font-size:14px; }
.priority-item { display:flex; align-items:center; gap:10px; padding:10px 16px; border-bottom:1px solid var(--border); }
.priority-item:nth-child(-n+4) { background:var(--green); }
.priority-rank { font-weight:700; font-size:16px; color:var(--primary); min-width:24px; text-align:center; }
.priority-info { flex:1; min-width:0; }
.priority-name { font-weight:600; font-size:14px; }
.priority-detail { font-size:11px; color:var(--text-light); }
.priority-tags { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
.priority-tag { font-size:10px; padding:2px 8px; border-radius:10px; background:var(--purple-bg); color:var(--primary); }
.priority-margin { text-align:right; font-weight:700; font-size:14px; color:var(--primary); white-space:nowrap; }

/* Overview cards */
.agent-cards { display:grid; gap:12px; }
.agent-card { background:var(--card); border-radius:12px; padding:16px; box-shadow:0 1px 4px rgba(0,0,0,.06); cursor:pointer; transition:transform .2s; display:flex; align-items:center; gap:12px; }
.agent-card:active { transform:scale(0.98); }
.agent-rank { font-size:20px; font-weight:700; min-width:32px; text-align:center; }
.agent-info { flex:1; min-width:0; }
.agent-name { font-weight:700; font-size:16px; }
.agent-team { font-size:11px; color:var(--text-light); }
.agent-margin { text-align:right; }
.agent-margin .big { font-size:18px; font-weight:700; color:var(--primary); }
.agent-margin .sub { font-size:10px; color:var(--text-light); }

/* Section title */
.section-title { font-size:14px; font-weight:700; color:var(--text-light); margin:20px 0 8px; padding-left:4px; }

/* Expand */
.expand-btn { display:block; width:100%; padding:10px; text-align:center; background:var(--purple-bg); color:var(--primary); border:none; border-radius:0 0 12px 12px; cursor:pointer; font-size:13px; font-weight:600; }
</style>
</head>

const MONTHS = ["4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月", "1月", "2月", "3月"];

function fmt(n) { if(!n) return '0'; return Math.round(n).toLocaleString(); }

function buildNav() {
  const nav = document.getElementById('nav');
  let html = '<button class="nav-btn active" onclick="showView('overview',this)">全体</button>';
  AGENTS.forEach((a,i) => {
    html += '<button class="nav-btn" onclick="showView('agent-'+i+'',this)">'+a.name+'</button>';
  });
  nav.innerHTML = html;
}

function showView(id, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(btn) btn.classList.add('active');
}

function rankClass(i) { return i<=3 ? ' rank-'+(i) : ''; }

function buildOverview() {
  let html = '<div id="overview" class="view active">';
  html += '<div class="section-title">担当者別 年間粗利ランキング</div>';
  html += '<div class="agent-cards">';
  AGENTS.forEach((a,i) => {
    const rc = i<3 ? ['🥇','🥈','🥉'][i] : (i+1);
    html += '<div class="agent-card" onclick="showView('agent-'+i+'',document.querySelectorAll('.nav-btn')['+(i+1)+'])">';
    html += '<div class="agent-rank">'+rc+'</div>';
    html += '<div class="agent-info"><div class="agent-name">'+a.name+'</div><div class="agent-team">'+a.team+'</div></div>';
    html += '<div class="agent-margin"><div class="big">¥'+fmt(a.total_margin)+'</div><div class="sub">月平均 ¥'+fmt(a.avg_margin)+' / '+a.num_masters+'名</div></div>';
    html += '</div>';
  });
  html += '</div></div>';
  return html;
}

function buildMonthChart(monthlyTotals) {
  const max = Math.max(...monthlyTotals, 1);
  let html = '<div class="month-chart">';
  monthlyTotals.forEach((v,i) => {
    const h = Math.max((v/max)*60, 2);
    html += '<div class="month-bar-wrap"><div class="month-bar" style="height:'+h+'px" title="'+MONTHS[i]+': ¥'+fmt(v)+'"></div><div class="month-bar-lbl">'+MONTHS[i]+'</div></div>';
  });
  html += '</div>';
  return html;
}

function buildAgentView(a, idx) {
  let html = '<div id="agent-'+idx+'" class="view">';
  
  // Name & team
  html += '<div style="margin-bottom:12px"><span style="font-size:22px;font-weight:700;color:var(--primary)">'+a.name+'</span>';
  if(a.team) html += ' <span style="font-size:12px;color:var(--text-light)">'+a.team+'</span>';
  html += '</div>';

  // Stats
  html += '<div class="stats">';
  const stats = [
    ['年間粗利','¥'+fmt(a.total_margin)], ['月平均粗利','¥'+fmt(a.avg_margin)], ['粗利率',a.rate+'%'],
    ['年間売上','¥'+fmt(a.total_sales)], ['案件数',a.total_cases], ['マスター数',a.num_masters+'名']
  ];
  stats.forEach(s => { html += '<div class="stat"><div class="val">'+s[1]+'</div><div class="lbl">'+s[0]+'</div></div>'; });
  html += '</div>';

  // Month chart
  html += buildMonthChart(a.monthly_totals);

  // Priority
  if(a.priority.length > 0) {
    html += '<div class="priority"><div class="priority-title">優先アプローチ推奨マスター</div>';
    a.priority.forEach((p,i) => {
      html += '<div class="priority-item">';
      html += '<div class="priority-rank">'+(i+1)+'</div>';
      html += '<div class="priority-info"><div class="priority-name">'+p.name+'</div>';
      html += '<div class="priority-detail">直近3ヶ月: ¥'+fmt(p.recent_margin)+' ('+p.recent_cases+'件) / 粗利率 '+p.rate+'%</div>';
      if(p.reason !== '-') {
        html += '<div class="priority-tags">';
        p.reason.split(' / ').forEach(t => { html += '<span class="priority-tag">'+t+'</span>'; });
        html += '</div>';
      }
      html += '</div>';
      html += '<div class="priority-margin">¥'+fmt(p.yearly_margin)+'</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  // Master table
  html += '<div class="section-title">マスター別粗利ランキング</div>';
  html += '<div class="table-wrap"><table>';
  html += '<tr><th class="sticky">#</th><th class="sticky" style="left:32px">マスター名</th><th>粗利合計</th><th>月平均</th><th>案件数</th><th>稼働月</th><th>粗利率</th>';
  MONTHS.forEach(m => { html += '<th>'+m+'</th>'; });
  html += '</tr>';
  
  const showAll = a.masters.length <= 20;
  const displayMasters = showAll ? a.masters : a.masters.slice(0, 15);
  
  displayMasters.forEach((m,i) => {
    const rc = i<3 ? '<span class="rank rank-'+(i+1)+'">'+(i+1)+'</span>' : (i+1);
    html += '<tr><td class="center">'+rc+'</td><td class="name" style="left:32px">'+m.name+'</td>';
    html += '<td class="num">'+fmt(m.margin)+'</td><td class="num">'+fmt(m.avg_margin)+'</td>';
    html += '<td class="center">'+m.cases+'</td><td class="center">'+m.months+'</td><td class="center">'+m.rate+'%</td>';
    m.monthly.forEach(v => { html += '<td class="num">'+(v?fmt(v):'-')+'</td>'; });
    html += '</tr>';
  });
  
  if(!showAll) {
    html += '<tr id="more-'+idx+'" style="display:none">';
    html += '</tr>';
  }
  
  html += '</table>';
  if(!showAll) {
    html += '<button class="expand-btn" onclick="expandTable('+idx+')">残り '+(a.masters.length-15)+' 名を表示</button>';
  }
  html += '</div>';

  html += '</div>';
  return html;
}

function expandTable(idx) {
  const a = AGENTS[idx];
  const table = document.querySelector('#agent-'+idx+' table');
  const btn = document.querySelector('#agent-'+idx+' .expand-btn');
  const remaining = a.masters.slice(15);
  let rows = '';
  remaining.forEach((m,i) => {
    const rank = i+16;
    rows += '<tr><td class="center">'+rank+'</td><td class="name" style="left:32px">'+m.name+'</td>';
    rows += '<td class="num">'+fmt(m.margin)+'</td><td class="num">'+fmt(m.avg_margin)+'</td>';
    rows += '<td class="center">'+m.cases+'</td><td class="center">'+m.months+'</td><td class="center">'+m.rate+'%</td>';
    m.monthly.forEach(v => { rows += '<td class="num">'+(v?fmt(v):'-')+'</td>'; });
    rows += '</tr>';
  });
  table.querySelector('tr:last-child').insertAdjacentHTML('afterend', rows);
  btn.style.display = 'none';
}
